<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Habit Tracker - Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #e5e7eb;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: rgba(15, 23, 42, 0.95);
        border-radius: 16px;
        padding: 32px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 24px;
        color: #9ca3af;
      }
      label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 4px;
        color: #e5e7eb;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
        box-sizing: border-box;
      }
      input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.5);
      }
      .field {
        margin-bottom: 16px;
      }
      button {
        width: 100%;
        padding: 10px 14px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: white;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;
        box-shadow: 0 16px 40px rgba(79, 70, 229, 0.6);
      }
      button:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(0);
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.5);
      }
      .muted {
        font-size: 0.85rem;
        margin-top: 16px;
        text-align: center;
      }
      .muted a {
        color: #a5b4fc;
        text-decoration: none;
      }
      .muted a:hover {
        text-decoration: underline;
      }
      .message {
        margin-top: 12px;
        font-size: 0.9rem;
        min-height: 1.2em;
      }
      .message.error {
        color: #fecaca;
      }
      .message.success {
        color: #bbf7d0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Create your study account</h1>
      <p>Track your daily sessions and build consistent habits.</p>
      <form id="signup-form">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="6" required />
        </div>
        <button type="submit">Sign up</button>
        <div id="message" class="message"></div>
      </form>
      <div class="muted">
        Already have an account?
        <a href="login.html">Log in</a>
      </div>
    </div>

    <script>
      const form = document.getElementById('signup-form');
      const messageEl = document.getElementById('message');

      const API_BASE =
        window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://localhost:5000'
          : '';

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageEl.textContent = '';
        messageEl.className = 'message';

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
          const res = await fetch(API_BASE + '/api/auth/signup', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ name, email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || 'Failed to sign up');
          }

          localStorage.setItem('token', data.token);
          messageEl.textContent = 'Account created! Redirecting to dashboard...';
          messageEl.classList.add('success');

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } catch (err) {
          messageEl.textContent = err.message;
          messageEl.classList.add('error');
        }
      });
    </script>
  </body>
  </html>
