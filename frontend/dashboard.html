<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Habit Tracker - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top, #111827, #020617 60%);
        color: #e5e7eb;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(31, 41, 55, 0.9);
        background: rgba(15, 23, 42, 0.96);
        position: sticky;
        top: 0;
        backdrop-filter: blur(14px);
        z-index: 10;
      }
      header h1 {
        font-size: 1.2rem;
        margin: 0;
      }
      header span {
        font-size: 0.9rem;
        color: #9ca3af;
      }
      .logout-btn {
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: transparent;
        color: #e5e7eb;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .logout-btn:hover {
        background: rgba(31, 41, 55, 0.9);
      }
      main {
        padding: 24px;
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1.1fr);
        gap: 20px;
      }
      @media (max-width: 800px) {
        main {
          grid-template-columns: minmax(0, 1fr);
        }
      }
      .card {
        background: rgba(15, 23, 42, 0.95);
        border-radius: 16px;
        padding: 20px;
        border: 1px solid rgba(55, 65, 81, 0.9);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
      }
      h2 {
        font-size: 1.1rem;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 4px;
        color: #e5e7eb;
      }
      input,
      select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        outline: none;
        font-size: 0.9rem;
      }
      input:focus,
      select:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.5);
      }
      .field {
        margin-bottom: 10px;
      }
      button.primary {
        padding: 8px 14px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: white;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        font-size: 0.9rem;
        box-shadow: 0 14px 32px rgba(79, 70, 229, 0.6);
      }
      button.primary:hover {
        filter: brightness(1.05);
        transform: translateY(-1px);
      }
      button.primary:active {
        transform: translateY(0);
        box-shadow: 0 10px 24px rgba(79, 70, 229, 0.5);
      }
      .message {
        margin-top: 8px;
        font-size: 0.85rem;
        min-height: 1.2em;
      }
      .message.error {
        color: #fecaca;
      }
      .message.success {
        color: #bbf7d0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      thead {
        background: rgba(31, 41, 55, 0.95);
      }
      th,
      td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid rgba(31, 41, 55, 0.9);
      }
      tbody tr:hover {
        background: rgba(31, 41, 55, 0.8);
      }
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(79, 70, 229, 0.15);
        color: #a5b4fc;
        font-size: 0.75rem;
      }
      .actions {
        display: flex;
        gap: 6px;
      }
      .btn-ghost {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: transparent;
        color: #e5e7eb;
        cursor: pointer;
        font-size: 0.75rem;
      }
      .btn-ghost:hover {
        background: rgba(31, 41, 55, 0.9);
      }
      .summary {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 0.85rem;
        color: #9ca3af;
      }
      .summary-item {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(31, 41, 55, 0.9);
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>AI Study Habit Tracker</h1>
        <span id="user-email"></span>
      </div>
      <button class="logout-btn" id="logout-btn">Log out</button>
    </header>

    <main>
      <section class="card">
        <h2>Add study session</h2>
        <form id="session-form" enctype="multipart/form-data">
          <div class="field">
            <label for="subject">Subject</label>
            <input id="subject" name="subject" type="text" required />
          </div>
          <div class="field">
            <label for="duration">Duration (minutes)</label>
            <input id="duration" name="duration" type="number" min="1" required />
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" />
          </div>
          <div class="field">
            <label for="proofImage">Proof image (optional)</label>
            <input id="proofImage" name="proofImage" type="file" accept="image/*" />
          </div>
          <button class="primary" type="submit">Save session</button>
          <div id="session-message" class="message"></div>
        </form>

        <div style="margin-top: 20px">
          <h2>Download report</h2>
          <p style="font-size: 0.85rem; color: #9ca3af; margin-bottom: 8px">
            Export all your sessions as a CSV file.
          </p>
          <button class="btn-ghost" id="download-report-btn">Download CSV</button>
        </div>
      </section>

      <section class="card">
        <h2>Study history</h2>
        <div class="field" style="display: flex; gap: 8px; margin-bottom: 12px">
          <div style="flex: 1">
            <label for="from">From</label>
            <input id="from" type="date" />
          </div>
          <div style="flex: 1">
            <label for="to">To</label>
            <input id="to" type="date" />
          </div>
          <div style="display: flex; align-items: flex-end">
            <button class="btn-ghost" type="button" id="filter-btn">Filter</button>
          </div>
        </div>
        <div class="summary" id="summary"></div>
        <div style="max-height: 320px; overflow: auto; margin-top: 10px">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Subject</th>
                <th>Duration</th>
                <th>Proof / Actions</th>
              </tr>
            </thead>
            <tbody id="sessions-body"></tbody>
          </table>
        </div>
        <div id="history-message" class="message"></div>
      </section>
    </main>

    <script>
      const API_BASE =
        window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://localhost:5000'
          : '';

      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = 'login.html';
      }

      const userEmailEl = document.getElementById('user-email');
      const logoutBtn = document.getElementById('logout-btn');

      const sessionForm = document.getElementById('session-form');
      const sessionMessage = document.getElementById('session-message');
      const historyMessage = document.getElementById('history-message');
      const sessionsBody = document.getElementById('sessions-body');
      const filterBtn = document.getElementById('filter-btn');
      const downloadReportBtn = document.getElementById('download-report-btn');
      const summaryEl = document.getElementById('summary');

      async function api(path, options = {}) {
        const res = await fetch(API_BASE + path, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {}),
            Authorization: 'Bearer ' + token,
          },
        });
        if (res.status === 204) return null;
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = data.message || 'Request failed';
          throw new Error(msg);
        }
        return data;
      }

      async function loadMe() {
        try {
          const me = await api('/api/auth/me', { method: 'GET' });
          userEmailEl.textContent = me.email;
        } catch {
          localStorage.removeItem('token');
          window.location.href = 'login.html';
        }
      }

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleDateString();
      }

      function renderSummary(sessions) {
        if (!sessions.length) {
          summaryEl.innerHTML = '';
          return;
        }
        const totalMinutes = sessions.reduce((sum, s) => sum + (s.duration || 0), 0);
        const totalHours = (totalMinutes / 60).toFixed(1);
        const bySubject = {};
        sessions.forEach((s) => {
          bySubject[s.subject] = (bySubject[s.subject] || 0) + s.duration;
        });

        const subjectChips = Object.entries(bySubject)
          .map(
            ([subject, mins]) =>
              `<span class="summary-item">${subject}: ${mins} min</span>`
          )
          .join('');

        summaryEl.innerHTML = `
          <span class="summary-item">Total: ${totalMinutes} min (${totalHours} h)</span>
          ${subjectChips}
        `;
      }

      function renderSessions(sessions) {
        if (!sessions.length) {
          sessionsBody.innerHTML = '';
          historyMessage.textContent = 'No sessions yet. Add your first one!';
          historyMessage.className = 'message';
          return;
        }
        historyMessage.textContent = '';
        historyMessage.className = 'message';

        sessionsBody.innerHTML = sessions
          .map(
            (s) => `
          <tr data-id="${s._id}">
            <td>${formatDate(s.date)}</td>
            <td>${s.subject}</td>
            <td><span class="chip">${s.duration} min</span></td>
            <td>
              <div class="actions">
                ${
                  s.proofImagePath
                    ? `<img src="${API_BASE + s.proofImagePath}" alt="Proof" style="width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid #4b5563;margin-right:8px;" />`
                    : ''
                }
                <button class="btn-ghost" data-action="delete">Delete</button>
              </div>
            </td>
          </tr>
        `
          )
          .join('');
      }

      async function loadSessions() {
        try {
          const params = new URLSearchParams();
          const from = document.getElementById('from').value;
          const to = document.getElementById('to').value;
          if (from) params.append('from', from);
          if (to) params.append('to', to);

          const query = params.toString() ? `?${params.toString()}` : '';
          const sessions = await api('/api/study-sessions' + query, {
            method: 'GET',
          });
          renderSessions(sessions);
          renderSummary(sessions);
        } catch (err) {
          historyMessage.textContent = err.message;
          historyMessage.className = 'message error';
        }
      }

      sessionForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        sessionMessage.textContent = '';
        sessionMessage.className = 'message';

        const subject = document.getElementById('subject').value.trim();
        const duration = Number(document.getElementById('duration').value);
        const date = document.getElementById('date').value;
        const proofInput = document.getElementById('proofImage');

        try {
          const formData = new FormData();
          formData.append('subject', subject);
          formData.append('duration', String(duration));
          if (date) {
            formData.append('date', date);
          }
          if (proofInput && proofInput.files && proofInput.files[0]) {
            formData.append('proofImage', proofInput.files[0]);
          }

          const res = await fetch(API_BASE + '/api/study-sessions', {
            method: 'POST',
            headers: {
              Authorization: 'Bearer ' + token,
            },
            body: formData,
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.message || 'Failed to save session');
          }

          sessionMessage.textContent = 'Session saved!';
          sessionMessage.classList.add('success');
          sessionForm.reset();
          await loadSessions();
        } catch (err) {
          sessionMessage.textContent = err.message;
          sessionMessage.classList.add('error');
        }
      });

      filterBtn.addEventListener('click', () => {
        loadSessions();
      });

      sessionsBody.addEventListener('click', async (e) => {
        const action = e.target.getAttribute('data-action');
        if (action === 'delete') {
          const row = e.target.closest('tr');
          const id = row.getAttribute('data-id');
          if (!id) return;
          if (!confirm('Delete this session?')) return;
          try {
            await api('/api/study-sessions/' + id, { method: 'DELETE' });
            await loadSessions();
          } catch (err) {
            historyMessage.textContent = err.message;
            historyMessage.className = 'message error';
          }
        }
      });

      downloadReportBtn.addEventListener('click', async () => {
        try {
          const res = await fetch(API_BASE + '/api/study-sessions/report/download', {
            method: 'GET',
            headers: {
              Authorization: 'Bearer ' + token,
            },
          });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.message || 'Failed to download report');
          }
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'study_report.csv';
          document.body.appendChild(a);
          a.click();
          a.remove();
          window.URL.revokeObjectURL(url);
        } catch (err) {
          historyMessage.textContent = err.message;
          historyMessage.className = 'message error';
        }
      });

      logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
      });

      (async function init() {
        await loadMe();
        await loadSessions();
      })();
    </script>
  </body>
  </html>
